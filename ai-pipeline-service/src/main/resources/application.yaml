server:
  port: 8084
spring:
  application:
    name: ai-pipeline-service

# AI Provider Configuration
ai:
  provider: gemini  # Options: mock, openai, gemini
  openai:
    api-key: ${OPENAI_API_KEY:your-openai-key-here}
    model: gpt-4o
  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-key-here}
    model: gemini-3-flash-preview

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

services:
  # 1. Database
  mysql: # Tên service
    image: mysql:8.0
    container_name: fintech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fintech_identity
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  # 2. Identity Service
  identity-service:
    container_name: identity-service
    build:
      context: ./identity-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql # Sửa thành 'mysql' để khớp với tên service ở trên

  # 2. Identity Service
  profile-service:
    container_name: profile-service
    build:
      context: ./profile-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql # Sửa thành 'mysql' để khớp với tên service ở trên

  # 3. API Gateway
  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - identity-service # Đợi Identity Service chạy lên trước

volumes:
  mysql_data:
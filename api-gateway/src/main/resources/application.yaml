server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # 1. Identity Service (Auth & User Management)
            - id: identity-service
              uri: lb://identity-service
              predicates:
                - Path=/identity/**
              filters:
                - AuthenticationFilter
                - StripPrefix=1

            # 2. Profile Service (User Profiles)
            - id: profile-service
              uri: lb://profile-service
              predicates:
                - Path=/profile/**
              filters:
                - AuthenticationFilter
                - StripPrefix=1

            # 3. Content Service (Content Projects & Outputs)
            - id: content-service
              uri: lb://content-service
              predicates:
                - Path=/content/**
              filters:
                - AuthenticationFilter

            # 4. AI Pipeline Service (AI Content Generation)
            - id: ai-pipeline-service
              uri: lb://ai-pipeline-service
              predicates:
                - Path=/pipeline/**
              filters:
                - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
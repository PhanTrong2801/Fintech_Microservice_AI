server:
  port: 8080 # Gateway thường chạy ở cổng đẹp nhất 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Định tuyến cho Identity Service
            - id: identity-service
              uri: lb://identity-service
              predicates:
                - Path=/identity/**
              filters:
                - AuthenticationFilter
                - StripPrefix=1
            # 2. Tuyến đường MỚI cho Profile Service
            - id: profile-service
              uri: lb://profile-service
              predicates:
                - Path=/profile/**
              filters:
                - AuthenticationFilter # Bắt buộc phải có Vé (Token) mới được vào!
                - StripPrefix=1

            - id: wallet-service
              uri: lb://wallet-service
              predicates:
                - Path=/wallet/**
              filters:
                - AuthenticationFilter
                - StripPrefix=1
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/